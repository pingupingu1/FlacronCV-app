name: flacroncv
description: AI-powered business automation platform (FlacronCV)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'   # using the stricter / newer lower bound

dependencies:
  flutter:
    sdk: flutter

  # ─────────────────────────────────────────────
  #  Required for localization / internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2                     # ← updated to allow patch versions

  # ─────────────────────────────────────────────
  #  UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

  # ─────────────────────────────────────────────
  #  State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1          # ← added for Riverpod state management

  # ─────────────────────────────────────────────
  #  Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10      # useful for push notifications

  # ─────────────────────────────────────────────
  #  Authentication helpers
  google_sign_in: ^6.2.1

  # ─────────────────────────────────────────────
  #  Notifications
  flutter_local_notifications: ^17.0.0

  # ─────────────────────────────────────────────
  #  HTTP / APIs / AI
  http: ^1.2.0
  google_generative_ai: ^0.2.2      # Gemini AI integration

  # ─────────────────────────────────────────────
  #  Payments
  flutter_stripe: ^10.1.1

  # ─────────────────────────────────────────────
  #  Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  image_picker: ^1.0.7

  # ─────────────────────────────────────────────
  #  Date & Calendar
  table_calendar: ^3.0.9

  # ─────────────────────────────────────────────
  #  Animations
  lottie: ^3.1.0

  # ─────────────────────────────────────────────
  #  Forms & Validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.3.0

  # ─────────────────────────────────────────────
  #  Environment / Config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    # Add your logo(s) & other assets when ready
    # - assets/images/
    # - assets/images/google_logo.png
    # - assets/animations/       ← if you use more lottie files