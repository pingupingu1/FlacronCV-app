services:
  - type: web
    name: flacroncontrol
    env: static
    buildCommand: |
      git clone https://github.com/flutter/flutter.git -b stable --depth 1 /opt/flutter
      export PATH="$PATH:/opt/flutter/bin"
      flutter config --enable-web
      flutter pub get
      flutter build web --release
    staticPublishPath: build/web
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
